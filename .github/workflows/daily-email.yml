name: Daily Foreign Policy Blogs Email

on:
  schedule:
    - cron: '0 12 * * *'  # 20:00 Beijing
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: normal | backfill'
        required: false
        default: 'normal'
        type: string
      backfill_days:
        description: 'Backfill days'
        required: false
        default: '7'
        type: string

permissions:
  contents: write

env:
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run daily task
        env:
          MODE: ${{ github.event.inputs.mode || 'normal' }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '7' }}
        run: python daily_task.py
      - name: Commit updates
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add processed_urls.json dailynews/ translate/
          git diff --staged --quiet || git commit -m "Update [skip ci]"
          git push